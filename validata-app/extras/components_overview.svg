<svg viewBox="0 0 1820 1520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Validata components overview</title>
<desc>Grid of the 10 Validata component folders, each with a short bullet list describing its responsibility: AIChat, Analysis, DataCollection, Login, Participants, ParticipantsView, Results, Sidebar, Toast, UserManagement.</desc>
<style>
  .card { fill: #2C2C2A; rx: 14; }
  .icon { fill: none; stroke: #ffffff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .icon-fill { fill: #ffffff; }
  .name { fill: #ffffff; font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; }
  .bullet { fill: #b4b2a9; font-family: Arial, sans-serif; font-size: 16px; }
  .dot { fill: #b4b2a9; }
</style>

<!-- Row 1 -->
<rect class="card" x="20" y="20" width="860" height="280"/>
<rect class="icon" x="47" y="40" width="18" height="12" rx="3"/>
<path class="icon" d="M52,52 L52,57 L57,52"/>
<text class="name" x="86" y="58">AIChat</text>
<circle class="dot" cx="56" cy="100" r="3"/><text class="bullet" x="76" y="105">Floating chat widget, open/close state</text>
<circle class="dot" cx="56" cy="135" r="3"/><text class="bullet" x="76" y="140">Builds data context from participants + measurements</text>
<circle class="dot" cx="56" cy="170" r="3"/><text class="bullet" x="76" y="175">Streams replies from /api/chat (Gemini)</text>
<circle class="dot" cx="56" cy="205" r="3"/><text class="bullet" x="76" y="210">Renders generateGraph tool calls as charts</text>

<rect class="card" x="940" y="20" width="860" height="280"/>
<rect class="icon-fill" x="969" y="50" width="3" height="8"/>
<rect class="icon-fill" x="975" y="44" width="3" height="14"/>
<rect class="icon-fill" x="981" y="47" width="3" height="11"/>
<text class="name" x="1006" y="58">Analysis</text>
<circle class="dot" cx="976" cy="100" r="3"/><text class="bullet" x="996" y="105">Mentor-only statistics view</text>
<circle class="dot" cx="976" cy="135" r="3"/><text class="bullet" x="996" y="140">RMSE, MAE, Bland-Altman, pass rate</text>
<circle class="dot" cx="976" cy="170" r="3"/><text class="bullet" x="996" y="175">Chart.js bar/doughnut + 5 Recharts components</text>
<circle class="dot" cx="976" cy="205" r="3"/><text class="bullet" x="996" y="210">PDF export via html2canvas-pro + jsPDF</text>

<!-- Row 2 -->
<rect class="card" x="20" y="320" width="860" height="280"/>
<rect class="icon" x="48" y="340" width="14" height="16" rx="2"/>
<rect class="icon-fill" x="52" y="338" width="6" height="3" rx="1"/>
<line class="icon" x1="51" y1="346" x2="59" y2="346"/>
<line class="icon" x1="51" y1="350" x2="59" y2="350"/>
<text class="name" x="86" y="358">DataCollection</text>
<circle class="dot" cx="56" cy="400" r="3"/><text class="bullet" x="76" y="405">Form to log one goniometer measurement</text>
<circle class="dot" cx="56" cy="435" r="3"/><text class="bullet" x="76" y="440">Picks an active participant + AI model used</text>
<circle class="dot" cx="56" cy="470" r="3"/><text class="bullet" x="76" y="475">Bulk upload entry point (CSV/Excel via xlsx)</text>
<circle class="dot" cx="56" cy="505" r="3"/><text class="bullet" x="76" y="510">Parsing happens fully client-side</text>

<rect class="card" x="940" y="320" width="860" height="280"/>
<rect class="icon" x="970" y="346" width="12" height="10" rx="2"/>
<path class="icon" d="M973,346 v-3 a3,3 0 0 1 6,0 v3"/>
<text class="name" x="1006" y="358">Login</text>
<circle class="dot" cx="976" cy="400" r="3"/><text class="bullet" x="996" y="405">Sign-in / register form, password visibility toggle</text>
<circle class="dot" cx="976" cy="435" r="3"/><text class="bullet" x="996" y="440">Calls Supabase auth directly from browser</text>
<circle class="dot" cx="976" cy="470" r="3"/><text class="bullet" x="996" y="475">Sets session, role and status cookies</text>
<circle class="dot" cx="976" cy="505" r="3"/><text class="bullet" x="996" y="510">Redirects to dashboard on success</text>

<!-- Row 3 -->
<rect class="card" x="20" y="620" width="860" height="280"/>
<circle class="icon" cx="52" cy="644" r="3"/>
<path class="icon" d="M47,656 a5,5 0 0 1 10,0"/>
<circle class="icon" cx="60" cy="646" r="2.5"/>
<path class="icon" d="M57,656 a4,4 0 0 1 7,-1"/>
<text class="name" x="86" y="658">Participants</text>
<circle class="dot" cx="56" cy="700" r="3"/><text class="bullet" x="76" y="705">Add new participants to the trial</text>
<circle class="dot" cx="56" cy="735" r="3"/><text class="bullet" x="76" y="740">Edit participant details</text>
<circle class="dot" cx="56" cy="770" r="3"/><text class="bullet" x="76" y="775">Suspend / reactivate participants</text>
<circle class="dot" cx="56" cy="805" r="3"/><text class="bullet" x="76" y="810">Full management, not read-only</text>

<rect class="card" x="940" y="620" width="860" height="280"/>
<path class="icon" d="M967,648 a9,5 0 0 1 18,0 a9,5 0 0 1 -18,0 z"/>
<circle class="icon" cx="976" cy="648" r="2.5"/>
<text class="name" x="1006" y="658">ParticipantsView</text>
<circle class="dot" cx="976" cy="700" r="3"/><text class="bullet" x="996" y="705">Read-only list of participants</text>
<circle class="dot" cx="976" cy="735" r="3"/><text class="bullet" x="996" y="740">No edit/suspend actions exposed</text>
<circle class="dot" cx="976" cy="770" r="3"/><text class="bullet" x="996" y="775">Available to team members too</text>
<circle class="dot" cx="976" cy="805" r="3"/><text class="bullet" x="996" y="810">Search/filter over the same data</text>

<!-- Row 4 -->
<rect class="card" x="20" y="920" width="860" height="280"/>
<rect class="icon" x="47" y="940" width="18" height="14" rx="2"/>
<line class="icon" x1="47" y1="947" x2="65" y2="947"/>
<line class="icon" x1="56" y1="940" x2="56" y2="954"/>
<text class="name" x="86" y="958">Results</text>
<circle class="dot" cx="56" cy="1000" r="3"/><text class="bullet" x="76" y="1005">Table view of logged measurements</text>
<circle class="dot" cx="56" cy="1035" r="3"/><text class="bullet" x="76" y="1040">Per-participant goniometer readings</text>
<circle class="dot" cx="56" cy="1070" r="3"/><text class="bullet" x="76" y="1075">Raw data behind the Analysis charts</text>

<rect class="card" x="940" y="920" width="860" height="280"/>
<line class="icon" x1="968" y1="943" x2="984" y2="943"/>
<line class="icon" x1="968" y1="948" x2="984" y2="948"/>
<line class="icon" x1="968" y1="953" x2="984" y2="953"/>
<text class="name" x="1006" y="958">Sidebar</text>
<circle class="dot" cx="976" cy="1000" r="3"/><text class="bullet" x="996" y="1005">Builds nav items from getNavItems(userRole)</text>
<circle class="dot" cx="976" cy="1035" r="3"/><text class="bullet" x="996" y="1040">Mentor-only items pushed in conditionally</text>
<circle class="dot" cx="976" cy="1070" r="3"/><text class="bullet" x="996" y="1075">Shows user avatar, email, role label</text>
<circle class="dot" cx="976" cy="1105" r="3"/><text class="bullet" x="996" y="1110">Logout button</text>

<!-- Row 5 -->
<rect class="card" x="20" y="1220" width="860" height="280"/>
<path class="icon" d="M51,1250 a5,5 0 0 1 10,0 v3 h-10 z"/>
<line class="icon" x1="54" y1="1256" x2="58" y2="1256"/>
<circle class="icon-fill" cx="56" cy="1241" r="1.5"/>
<text class="name" x="86" y="1258">Toast</text>
<circle class="dot" cx="56" cy="1300" r="3"/><text class="bullet" x="76" y="1305">Transient success/error/info banners</text>
<circle class="dot" cx="56" cy="1335" r="3"/><text class="bullet" x="76" y="1340">Triggered by handlers in page.js</text>
<circle class="dot" cx="56" cy="1370" r="3"/><text class="bullet" x="76" y="1375">Auto-dismiss after a timeout</text>
<circle class="dot" cx="56" cy="1405" r="3"/><text class="bullet" x="76" y="1410">No persistence, no API calls</text>

<rect class="card" x="940" y="1220" width="860" height="280"/>
<path class="icon" d="M976,1240 l8,3 v6 c0,5 -4,8 -8,9 c-4,-1 -8,-4 -8,-9 v-6 z"/>
<path class="icon" d="M972,1249 l3,3 l6,-6"/>
<text class="name" x="1006" y="1258">UserManagement</text>
<circle class="dot" cx="976" cy="1300" r="3"/><text class="bullet" x="996" y="1305">Mentor-only account administration</text>
<circle class="dot" cx="976" cy="1335" r="3"/><text class="bullet" x="996" y="1340">Approve pending sign-ups</text>
<circle class="dot" cx="976" cy="1370" r="3"/><text class="bullet" x="996" y="1375">Change role / suspend accounts</text>
<circle class="dot" cx="976" cy="1405" r="3"/><text class="bullet" x="996" y="1410">Talks to /api/profiles (GET/PATCH/DELETE)</text>
</svg>
